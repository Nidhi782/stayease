<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" width="320" height="110">
  <defs>
    <linearGradient id="bG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8f0df"/>
      <stop offset="100%" stop-color="#e8f8f0"/>
    </linearGradient>
    <linearGradient id="rG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
  </defs>

  <!-- Left page -->
  <path d="M30 88 Q30 48 62 42 L62 92 Q48 90 30 88 Z" fill="url(#bG)" stroke="#1D9E75" stroke-width="1.5"/>
  <!-- Right page -->
  <path d="M94 88 Q94 48 62 42 L62 92 Q76 90 94 88 Z" fill="url(#bG)" stroke="#1D9E75" stroke-width="1.5"/>
  <!-- Spine -->
  <line x1="62" y1="42" x2="62" y2="92" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Text lines left page -->
  <line x1="38" y1="60" x2="56" y2="58" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="38" y1="68" x2="56" y2="66" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="38" y1="76" x2="56" y2="74" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <!-- Text lines right page -->
  <line x1="68" y1="58" x2="86" y2="60" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="66" x2="86" y2="68" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="68" y1="74" x2="86" y2="76" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

  <!-- Rooftop -->
  <polygon points="30,58 62,24 94,58" fill="url(#rG)"/>
  <line x1="62" y1="24" x2="62" y2="58" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Chimney left -->
  <rect x="42" y="30" width="5" height="10" rx="1" fill="#0F6E56"/>
  <!-- Chimney right -->
  <rect x="77" y="34" width="4" height="8" rx="1" fill="#0F6E56"/>
  <!-- Attic window -->
  <rect x="59" y="42" width="6" height="5" rx="1" fill="white" opacity="0.6"/>
  <!-- Base line -->
  <line x1="24" y1="92" x2="100" y2="92" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>

  <!-- WORDMARK only -->
  <text x="116" y="70" font-family="Georgia,serif" font-size="40" font-weight="400" letter-spacing="-1">
    <tspan fill="#1a1a2e">Stay</tspan><tspan fill="#1D9E75">Ease</tspan>
  </text>
</svg>
